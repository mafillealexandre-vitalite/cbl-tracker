<script type="text/babel">
const{useState,useEffect,useRef}=React;
const db=window.db;
const PALETTE=["#FF3B30","#0A84FF","#30D158","#FFD60A","#FF9500"];
const G={bg:"#08090C",surface:"#10131A",border:"#1E2330",text:"#E8EAF0",muted:"#4A5068"};
const DEF_EX=[{name:"Pull-ups",reps:25},{name:"Dips",reps:30},{name:"Muscle-ups",reps:10},{name:"L-sit",reps:20},{name:"Push-ups",reps:30}];

function rgb(h){return`${parseInt(h.slice(1,3),16)},${parseInt(h.slice(3,5),16)},${parseInt(h.slice(5,7),16)}`;}
function fmt(ms){if(!ms&&ms!==0)return"--:--.--";const m=Math.floor(ms/60000),s=Math.floor((ms%60000)/1000),cs=Math.floor((ms%1000)/10);return`${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}.${String(cs).padStart(2,"0")}`;}
function genId(){return Math.random().toString(36).slice(2,7).toUpperCase();}
function Label({children}){return<div style={{fontSize:11,letterSpacing:4,color:G.muted,fontWeight:700,borderLeft:"3px solid #1E2330",paddingLeft:10,marginBottom:14}}>{children}</div>;}
function Loader(){return<div style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:G.muted,fontSize:18,letterSpacing:4}}>CONNEXION…</div>;}
function Spinner(){return<span style={{display:"inline-block",width:10,height:10,border:"2px solid #4A5068",borderTopColor:PALETTE[1],borderRadius:"50%",animation:"spin .6s linear infinite"}}/>;}

// ── WEB AUDIO ─────────────────────────────────────────────────────────────────
let _actx=null;
function getACtx(){
  if(!_actx)_actx=new(window.AudioContext||window.webkitAudioContext)();
  if(_actx.state==="suspended")_actx.resume();
  return _actx;
}
function _tone(freq,type,dur,delay=0,gain=0.35){
  try{
    const ctx=getACtx();const o=ctx.createOscillator();const g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);o.type=type;o.frequency.value=freq;
    const t=ctx.currentTime+delay;
    g.gain.setValueAtTime(gain,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.start(t);o.stop(t+dur+0.01);
  }catch(e){}
}
const beepShort=()=>_tone(900,"square",0.10,0,0.3);
const beepLong=()=>_tone(900,"square",0.55,0,0.3);
function soundNoRep(){
  try{
    const ctx=getACtx();const o=ctx.createOscillator();const g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);o.type="sawtooth";
    o.frequency.setValueAtTime(380,ctx.currentTime);
    o.frequency.linearRampToValueAtTime(100,ctx.currentTime+0.45);
    g.gain.setValueAtTime(0.45,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.48);
    o.start(ctx.currentTime);o.stop(ctx.currentTime+0.5);
  }catch(e){}
}
function soundVictory(){
  [261.63,329.63,392.00,493.88,523.25].forEach((f,i)=>_tone(f,"sine",0.32,i*0.16,0.4));
  setTimeout(()=>[523.25,659.25,783.99].forEach(f=>_tone(f,"sine",0.7,0,0.3)),860);
}
// ─────────────────────────────────────────────────────────────────────────────

const params=new URLSearchParams(window.location.search);
const urlMode=params.get("mode"),urlSession=params.get("session"),urlAthlete=params.get("athlete");

// ── QR CODE ───────────────────────────────────────────────────────────────
function QRBlock({url,color}){
  const ref=useRef();
  useEffect(()=>{
    if(!ref.current)return;
    ref.current.innerHTML="";
    new QRCode(ref.current,{text:url,width:140,height:140,colorDark:"#000000",colorLight:"#FFFFFF",correctLevel:QRCode.CorrectLevel.M});
  },[url]);
  return<div ref={ref} style={{borderRadius:8,overflow:"hidden",border:`3px solid ${color||"#fff"}`,display:"inline-block",lineHeight:0}}/>;
}

function QRCard({name,color,url}){
  const[copied,setCopied]=useState(false);
  const copy=()=>{navigator.clipboard?.writeText(url);setCopied(true);setTimeout(()=>setCopied(false),2000);};
  return(
    <div style={{background:G.surface,border:`1px solid ${G.border}`,borderTop:`3px solid ${color}`,borderRadius:12,padding:16,display:"flex",flexDirection:"column",alignItems:"center",gap:10}}>
      <div style={{fontSize:18,fontWeight:900,color,letterSpacing:2}}>{name.toUpperCase()}</div>
      <QRBlock url={url} color={color}/>
      <div style={{fontSize:9,letterSpacing:2,color:G.muted,textAlign:"center"}}>SESSION · JUGE</div>
      <button onClick={copy} style={{width:"100%",background:copied?"rgba(48,209,88,0.15)":G.border,border:`1px solid ${copied?"#30D158":G.border}`,borderRadius:6,color:copied?"#30D158":G.muted,fontFamily:"'Barlow Condensed',sans-serif",fontSize:11,fontWeight:700,letterSpacing:2,padding:"7px",cursor:"pointer"}}>
        {copied?"✓ COPIÉ":"COPIER LE LIEN"}
      </button>
    </div>
  );
}

// ── SETUP ──────────────────────────────────────────────────────────────────
function SetupScreen(){
  const[n,setN]=useState(4);
  const[phase,setPhase]=useState("");
  const[athletes,setAthletes]=useState(PALETTE.map(c=>({name:"",color:c})));
  const[exercises,setExercises]=useState(DEF_EX);
  const[newName,setNewName]=useState("");
  const[newReps,setNewReps]=useState(20);
  const[sessionId,setSessionId]=useState(null);
  const[creating,setCreating]=useState(false);
  const[createError,setCreateError]=useState("");
  const[pasteText,setPasteText]=useState("");
  const[pasteOpen,setPasteOpen]=useState(false);
  const[pasteError,setPasteError]=useState("");

  const active=athletes.slice(0,n).filter(a=>a.name.trim());
  const ok=active.length>=2&&exercises.length>=1;

  // ── PARSER TEXTE LOCAL (zéro API) ─────────────────────────────────────────
  const SKIP=/(time\s*cap|qualifier|division|espoir|amateur|routine|wod\s*type|exemple|cbl\s*cup|^cbl$|^cbe$|finale|paris|open\s*qualifier|causthene|bater|^unbroken$)/i;

  const parseCircuit=()=>{
    // Étape 1 : fusionner les lignes de continuation (commençant par +)
    const rawLines=pasteText.split(/\n/).map(l=>l.trim()).filter(Boolean);
    const merged=[];
    for(const line of rawLines){
      if(line.startsWith("+")&&merged.length>0) merged[merged.length-1]+=" "+line;
      else merged.push(line);
    }

    // Étape 2 : éclater les lignes à virgule (ex: "[A+B] x3, 20 Push, 12 Pull")
    const items=[];
    for(const line of merged){
      const parts=line.split(/,\s+/);
      items.push(...parts.map(p=>p.trim()).filter(Boolean));
    }

    const result=[];
    for(let line of items){
      if(SKIP.test(line))continue;
      // Normalise : e16 KG→@16 KG, "→s (secondes), parasites
      line=line.replace(/\be(\d+)\s*[kK][gG]/g,"@$1 KG").replace(/"/g,"s").replace(/[#ơ]/g,"").trim();
      if(!line)continue;

      // parseSeg : parse un segment individuel (reps ou temps)
      const parseSeg=seg=>{
        seg=seg.trim();if(!seg)return null;
        const tS=seg.match(/^(\d+)s\s+(.+)$/i);
        if(tS){const dur=parseInt(tS[1]),nm=tS[2].replace(/\s+/g," ").trim();if(nm.length>1&&dur>=1&&dur<=3600)return{name:nm,isTime:true,duration:dur};}
        const tE=seg.match(/^(.+?)\s+(\d+)s$/i);
        if(tE){const dur=parseInt(tE[2]),nm=tE[1].replace(/\s+/g," ").trim();if(nm.length>1&&dur>=1&&dur<=3600)return{name:nm,isTime:true,duration:dur};}
        const m=seg.match(/^(\d+)\s+(.+)$/);
        if(m){const reps=parseInt(m[1]);if(reps>=1&&reps<=500){const name=m[2].replace(/\s+/g," ").trim();if(name.length>1)return{name,reps};}}
        return null;
      };

      // ── Exercice de remplacement : ligne commençant par * ──────────────────
      if(line.startsWith("*")&&result.length>0){
        const inner=line.slice(1).trim();
        const s=parseSeg(inner);
        if(s&&!s.isTime)result[result.length-1].fallback={name:s.name,reps:s.reps};
        continue;
      }

      // Bloc [contenu] ou (contenu)
      const bm=line.match(/^[\[\(]([^\]\)]+)[\]\)](.*)$/i);
      if(bm){
        const inside=bm[1].trim();
        const after=bm[2];
        const multM=after.match(/[xX×]\s*(\d+)/);
        const reps=multM?parseInt(multM[1]):1;
        // Si inside contient ' + ', essayer de parser comme chain
        if(inside.includes(' + ')){
          const steps=inside.split(/\s+\+\s+/).map(parseSeg).filter(Boolean);
          if(steps.length>1){
            const chainName=steps.map(s=>s.isTime?`${s.duration}s ${s.name}`:`${s.reps} ${s.name}`).join(' + ');
            result.push({name:chainName,isChain:true,steps,reps});
            continue;
          }
        }
        // Sinon : bloc nommé classique avec poids éventuel
        const wM=after.match(/@[\d.,]+\s*[kK][gG]/i);
        const suffix=wM?" "+wM[0].toUpperCase():"";
        const name=(inside+suffix).replace(/\s+/g," ").trim();
        if(name.length>1)result.push({name,reps});
        continue;
      }

      // Multi-segment par " + " hors brackets → chain block si >1 segment
      const segs=line.split(/\s+\+\s+/);
      if(segs.length>1){
        const steps=segs.map(parseSeg).filter(Boolean);
        if(steps.length>0){
          const chainName=steps.map(s=>s.isTime?`${s.duration}s ${s.name}`:`${s.reps} ${s.name}`).join(' + ');
          result.push({name:chainName,isChain:true,steps,reps:1});
        }
      }else{
        const s=parseSeg(segs[0]);
        if(s)result.push(s.isTime?{name:s.name,isTime:true,reps:s.duration}:s);
      }
    }
    if(result.length===0){setPasteError("Aucun exercice détecté. Vérifie que chaque ligne commence par un nombre.");return;}
    setExercises(result.slice(0,12));
    setPasteOpen(false);setPasteText("");setPasteError("");
  };

  const create=async()=>{
    if(!ok)return;setCreating(true);setCreateError("");
    try{
      const id=genId();
      await db.ref(`sessions/${id}`).set({
        id,phase:phase||"Battle",started:false,startTime:null,
        athletes:Object.fromEntries(active.map(a=>[a.name,{
          color:a.color,currentExercise:0,finishTime:null,noReps:0,
          exercises:exercises.map(ex=>ex.isChain?{name:ex.name,type:"chain",currentStep:0,done:false,steps:ex.steps.map(s=>s.isTime?{name:s.name,type:"time",duration:s.duration,timerStarted:null,done:false,failed:false}:{name:s.name,targetReps:s.reps,completedReps:0,done:false})}:ex.isTime?{name:ex.name,type:"time",duration:Number(ex.reps),timerStarted:null,done:false,failed:false}:{name:ex.name,targetReps:Number(ex.reps),completedReps:0,done:false,...(ex.fallback?{fallback:{name:ex.fallback.name,targetReps:Number(ex.fallback.reps)}}:{})})
        }]))
      });
      setSessionId(id);
    }catch(err){
      setCreateError("Erreur Firebase : "+(err.message||"vérifiez les règles de sécurité du projet cbl-cup"));
    }finally{setCreating(false);}
  };

  if(sessionId){
    const base=window.location.origin+window.location.pathname;
    const judgeUrl=(name)=>`${base}?mode=judge&session=${sessionId}&athlete=${encodeURIComponent(name)}`;
    const screenUrl=`${base}?mode=screen&session=${sessionId}`;
    return(
      <div style={{minHeight:"100vh",background:G.bg,padding:"28px 20px",animation:"fadein .4s ease"}}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{fontSize:10,letterSpacing:6,color:G.muted,marginBottom:6}}>SESSION CRÉÉE</div>
          <div style={{fontSize:56,fontWeight:900,letterSpacing:10,color:"#30D158",fontFamily:"'Share Tech Mono',monospace"}}>{sessionId}</div>
        </div>

        <div style={{maxWidth:760,margin:"0 auto",display:"grid",gap:16}}>
          <div style={{fontSize:11,letterSpacing:4,color:G.muted,borderLeft:"3px solid #1E2330",paddingLeft:10}}>📱 QR CODES JUGES — scanne avec le téléphone</div>
          <div style={{display:"grid",gridTemplateColumns:`repeat(${Math.min(active.length,3)},1fr)`,gap:12}}>
            {active.map(a=><QRCard key={a.name} name={a.name} color={a.color} url={judgeUrl(a.name)}/>)}
          </div>

          <div style={{background:G.surface,border:`1px solid ${G.border}`,borderRadius:12,padding:20,display:"flex",alignItems:"center",gap:20,flexWrap:"wrap"}}>
            <div style={{flexShrink:0}}>
              <div style={{fontSize:11,letterSpacing:4,color:G.muted,marginBottom:10}}>🖥️ ÉCRAN PRINCIPAL</div>
              <QRBlock url={screenUrl} color={PALETTE[1]}/>
            </div>
            <div style={{flex:1,minWidth:200}}>
              <div style={{fontFamily:"monospace",fontSize:10,color:PALETTE[1],wordBreak:"break-all",marginBottom:12}}>{screenUrl}</div>
              <a href={screenUrl} style={{display:"inline-block",background:`linear-gradient(135deg,#FF3B30,#0A84FF)`,borderRadius:10,color:"#fff",fontSize:18,fontWeight:900,letterSpacing:4,padding:"14px 32px",textDecoration:"none"}}>
                OUVRIR L'ÉCRAN →
              </a>
            </div>
          </div>
        </div>
      </div>
    );
  }

  return(
    <div style={{minHeight:"100vh",background:G.bg,padding:"28px 20px"}}>
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{fontSize:10,letterSpacing:6,color:G.muted,marginBottom:6}}>CALISTHENICS BATTLE LEAGUE</div>
        <div style={{fontSize:36,fontWeight:900,letterSpacing:2,background:`linear-gradient(135deg,${PALETTE[0]},${PALETTE[1]},${PALETTE[2]})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>BATTLE SETUP</div>
      </div>
      <div style={{maxWidth:760,margin:"0 auto",display:"grid",gap:24}}>

        <section>
          <Label>① ATHLÈTES &amp; PHASE</Label>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:12}}>
            {[2,3,4,5].map(v=>(
              <button key={v} onClick={()=>setN(v)} style={{background:n===v?`rgba(${rgb(PALETTE[1])},0.15)`:G.surface,border:`1px solid ${n===v?PALETTE[1]:G.border}`,borderRadius:8,padding:"12px",cursor:"pointer",color:G.text,fontFamily:"'Barlow Condensed',sans-serif"}}>
                <div style={{fontSize:26,fontWeight:900,color:n===v?PALETTE[1]:G.text}}>{v}</div>
                <div style={{fontSize:10,color:G.muted,letterSpacing:1}}>ATHLÈTES</div>
              </button>
            ))}
          </div>
          <input value={phase} onChange={e=>setPhase(e.target.value)} placeholder="Phase (ex: Poule A, Finale...)"
            style={{width:"100%",background:G.surface,border:`1px solid ${G.border}`,borderRadius:6,color:G.text,fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,padding:"10px 12px",outline:"none"}}/>
        </section>

        <section>
          <Label>② NOM DES ATHLÈTES</Label>
          <div style={{display:"grid",gridTemplateColumns:`repeat(${n},1fr)`,gap:10}}>
            {athletes.slice(0,n).map((a,i)=>(
              <div key={i} style={{background:G.surface,border:`1px solid ${G.border}`,borderTop:`3px solid ${a.color}`,borderRadius:8,padding:14}}>
                <input value={a.name} onChange={e=>setAthletes(p=>p.map((x,j)=>j===i?{...x,name:e.target.value}:x))} placeholder={`Athlète ${i+1}`}
                  style={{width:"100%",background:"transparent",border:"none",borderBottom:`1px solid ${G.border}`,color:G.text,fontFamily:"'Barlow Condensed',sans-serif",fontSize:18,fontWeight:700,outline:"none",paddingBottom:4,marginBottom:10}}/>
                <input type="color" value={a.color} onChange={e=>setAthletes(p=>p.map((x,j)=>j===i?{...x,color:e.target.value}:x))}/>
              </div>
            ))}
          </div>
        </section>

        {pasteOpen&&(
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
            <div style={{background:G.surface,border:`1px solid ${G.border}`,borderRadius:14,padding:24,width:"100%",maxWidth:520,display:"grid",gap:14}}>
              <div style={{fontSize:11,letterSpacing:4,color:G.muted}}>COLLER LE CIRCUIT</div>
              <div style={{fontSize:12,color:G.muted,lineHeight:1.6}}>
                Copie le texte de ton PDF et colle-le ici.<br/>
                <span style={{color:"#FFD60A"}}>Format attendu :</span> une ligne par exercice avec le nombre de reps.<br/>
                <span style={{fontFamily:"monospace",fontSize:11}}>1 Muscle-up | 15 Dips | 20 Push-ups</span><br/>
                <span style={{color:"#FF9500",fontFamily:"monospace",fontSize:11}}>*5 Chest Pull-up</span><span style={{fontSize:11}}> ← fallback si l'exercice précédent est raté</span>
              </div>
              <textarea value={pasteText} onChange={e=>setPasteText(e.target.value)}
                placeholder={"1 Muscle-up\n*5 Chest Pull-up\n15 Dips\n20 Push-ups"}
                style={{width:"100%",height:180,background:G.bg,border:`1px solid ${G.border}`,borderRadius:8,color:G.text,fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,padding:"10px 12px",outline:"none",resize:"vertical"}}/>
              {pasteError&&<div style={{fontSize:12,color:"#FF3B30"}}>{pasteError}</div>}
              <div style={{display:"flex",gap:10}}>
                <button onClick={()=>{setPasteOpen(false);setPasteText("");setPasteError("");}}
                  style={{flex:1,background:G.border,border:"none",borderRadius:8,color:G.muted,fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,fontWeight:700,padding:"12px",cursor:"pointer"}}>ANNULER</button>
                <button onClick={parseCircuit} disabled={!pasteText.trim()}
                  style={{flex:2,background:pasteText.trim()?`linear-gradient(135deg,${PALETTE[1]},${PALETTE[2]})`:G.border,border:"none",borderRadius:8,color:pasteText.trim()?"#fff":G.muted,fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,fontWeight:900,letterSpacing:2,padding:"12px",cursor:pasteText.trim()?"pointer":"not-allowed"}}>
                  IMPORTER LE CIRCUIT →
                </button>
              </div>
            </div>
          </div>
        )}

        <section>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
            <Label>③ CIRCUIT &amp; RÉPÉTITIONS ({exercises.length}/12)</Label>
            <button onClick={()=>setPasteOpen(true)}
              style={{display:"inline-flex",alignItems:"center",gap:6,background:`rgba(${rgb(PALETTE[1])},0.15)`,border:`1px solid ${PALETTE[1]}`,borderRadius:6,padding:"6px 14px",cursor:"pointer",color:PALETTE[1],fontFamily:"'Barlow Condensed',sans-serif",fontSize:12,fontWeight:700,letterSpacing:2,whiteSpace:"nowrap"}}>
              📋 COLLER UN CIRCUIT
            </button>
          </div>
          <div style={{display:"grid",gap:6}}>
            {exercises.map((ex,i)=>(
              <div key={i} style={{background:G.surface,border:`1px solid ${ex.fallback?"rgba(255,149,0,.35)":G.border}`,borderLeft:`3px solid ${ex.fallback?"#FF9500":G.border}`,borderRadius:6,padding:"8px 12px",display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontFamily:"monospace",fontSize:10,color:G.muted,width:20}}>{String(i+1).padStart(2,"0")}</span>
                <div style={{flex:1}}>
                  <input value={ex.name} onChange={e=>setExercises(p=>p.map((x,j)=>j===i?{...x,name:e.target.value}:x))}
                    style={{width:"100%",background:"transparent",border:"none",color:G.text,fontFamily:"'Barlow Condensed',sans-serif",fontSize:15,fontWeight:600,outline:"none"}}/>
                  {ex.fallback&&<div style={{fontSize:10,color:"#FF9500",marginTop:2}}>↳ Fallback : {ex.fallback.reps} {ex.fallback.name}</div>}
                </div>
                {ex.isChain?(
                  <span style={{fontFamily:"'Share Tech Mono',monospace",fontSize:10,fontWeight:700,color:"#FF9500",whiteSpace:"nowrap"}}>⛓ {ex.steps.length} STEPS</span>
                ):(<>
                  <button onClick={()=>setExercises(p=>p.map((x,j)=>j===i?{...x,reps:Math.max(1,x.reps-5)}:x))} style={{background:G.border,border:"none",borderRadius:4,color:G.text,width:26,height:26,cursor:"pointer",fontSize:16,fontFamily:"monospace"}}>−</button>
                  <span style={{fontFamily:"'Share Tech Mono',monospace",fontSize:ex.isTime?11:16,fontWeight:700,color:ex.isTime?"#0A84FF":"#FFD60A",width:ex.isTime?52:34,textAlign:"center"}}>{ex.isTime?`⏱ ${ex.reps}s`:ex.reps}</span>
                  <button onClick={()=>setExercises(p=>p.map((x,j)=>j===i?{...x,reps:ex.reps+5}:x))} style={{background:G.border,border:"none",borderRadius:4,color:G.text,width:26,height:26,cursor:"pointer",fontSize:16,fontFamily:"monospace"}}>+</button>
                </>)}
                <button onClick={()=>setExercises(p=>p.filter((_,j)=>j!==i))} style={{background:"transparent",border:"none",color:"#FF3B30",cursor:"pointer",fontSize:13,padding:"2px 4px"}}>✕</button>
              </div>
            ))}
          </div>
          {exercises.length<12&&(
            <div style={{display:"flex",gap:8,marginTop:8}}>
              <input value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&newName.trim()&&(setExercises(p=>[...p,{name:newName.trim(),reps:newReps}]),setNewName(""))} placeholder="Nouvel exercice..."
                style={{flex:1,background:G.surface,border:`1px solid ${G.border}`,borderRadius:6,color:G.text,fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,padding:"8px 12px",outline:"none"}}/>
              <input type="number" value={newReps} onChange={e=>setNewReps(parseInt(e.target.value)||1)} min="1"
                style={{width:68,background:G.surface,border:`1px solid ${G.border}`,borderRadius:6,color:"#FFD60A",fontFamily:"'Share Tech Mono',monospace",fontSize:14,fontWeight:700,padding:"8px",outline:"none",textAlign:"center"}}/>
              <button onClick={()=>{if(!newName.trim())return;setExercises(p=>[...p,{name:newName.trim(),reps:newReps}]);setNewName("");}}
                style={{background:G.border,border:"none",borderRadius:6,color:G.text,fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,fontWeight:700,padding:"8px 16px",cursor:"pointer"}}>+ ADD</button>
            </div>
          )}
        </section>

        {!ok&&<div style={{textAlign:"center",fontSize:13,color:G.muted,letterSpacing:1,padding:"8px 0"}}>👥 Remplis au moins 2 noms d'athlètes pour continuer</div>}
        <button onClick={()=>{getACtx();create();}} disabled={!ok||creating}
          style={{width:"100%",padding:18,background:ok?`linear-gradient(135deg,#FF3B30,#0A84FF)`:G.surface,border:"none",borderRadius:10,color:ok?"#fff":G.muted,fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:900,letterSpacing:6,cursor:ok?"pointer":"not-allowed"}}>
          {creating?"CRÉATION…":"CRÉER LA SESSION →"}
        </button>
        {createError&&<div style={{background:"rgba(255,59,48,0.1)",border:"2px solid #FF3B30",borderRadius:8,padding:"14px 16px",fontSize:14,color:"#FF3B30",marginTop:10,fontWeight:700}}>{createError}</div>}
      </div>
    </div>
  );
}

// ── JUDGE ──────────────────────────────────────────────────────────────────
function JudgeScreen({sessionId,athleteName:initAthlete}){
  const[session,setSession]=useState(null);
  const[selected,setSelected]=useState(initAthlete||null);
  const[athlete,setAthlete]=useState(null);
  const[started,setStarted]=useState(false);
  const[flash,setFlash]=useState(false);
  const[flashNR,setFlashNR]=useState(false);
  const[countdown,setCountdown]=useState(null);
  // ── Fallback (Muscle-up raté) ──────────────────────────────────────────────
  const[fallbackMode,setFallbackMode]=useState(false);
  const[fallbackReps,setFallbackReps]=useState(0);
  const[fallbackFlash,setFallbackFlash]=useState(false);
  const aRef=useRef(null);
  const timerRef=useRef(null);
  // Victory sound guard
  const prevFinished=useRef(false);
  // Beep guard: avoid re-firing on re-render
  const beepFiredRef=useRef({b2:false,b1:false,b0:false});
  // Circuit strip auto-scroll
  const stripRef=useRef(null);

  useEffect(()=>{
    db.ref(`sessions/${sessionId}`).once("value",s=>{if(s.exists())setSession(s.val());});
    db.ref(`sessions/${sessionId}/started`).on("value",s=>setStarted(!!s.val()));
    return()=>db.ref(`sessions/${sessionId}/started`).off();
  },[]);

  useEffect(()=>{
    if(aRef.current)aRef.current.off();
    if(!selected){setAthlete(null);return;}
    aRef.current=db.ref(`sessions/${sessionId}/athletes/${selected}`);
    aRef.current.on("value",s=>{if(s.exists())setAthlete(s.val());});
    return()=>aRef.current&&aRef.current.off();
  },[selected]);

  // Reset fallback state when exercise changes
  useEffect(()=>{
    setFallbackMode(false);
    setFallbackReps(0);
    // Auto-scroll bande circuit vers l'exercice courant
    const pill=document.getElementById(`strip-pill-${athlete?.currentExercise||0}`);
    if(pill)pill.scrollIntoView({behavior:"smooth",block:"nearest",inline:"center"});
  },[athlete?.currentExercise]);

  // Victory sound when athlete finishes
  useEffect(()=>{
    const finished=!!athlete?.finishTime;
    if(finished&&!prevFinished.current){soundVictory();}
    prevFinished.current=finished;
  },[athlete?.finishTime]);

  // Sync countdown depuis Firebase timerStarted (chain ou exercice simple)
  // + beeps dernières 3 secondes
  useEffect(()=>{
    clearInterval(timerRef.current);
    beepFiredRef.current={b2:false,b1:false,b0:false};
    const i=athlete?.currentExercise||0;
    const ex=athlete?.exercises?.[i];
    let activeStep;
    if(ex?.type==="chain"){const si=ex.currentStep||0;activeStep=ex.steps?.[si];}
    else activeStep=ex;
    if(!activeStep||activeStep.type!=="time"||activeStep.done){setCountdown(null);return;}
    const calcMs=()=>(activeStep.accumulatedMs||0)+(activeStep.timerStarted?Date.now()-activeStep.timerStarted:0);
    const calcRem=()=>Math.max(0,(activeStep.duration||0)-Math.floor(calcMs()/1000));
    const rem=calcRem();
    setCountdown(rem);
    // En pause (pas de timerStarted) : countdown figé, pas d'intervalle
    if(!activeStep.timerStarted)return;
    if(rem>0)timerRef.current=setInterval(()=>{
      const next=calcRem();
      setCountdown(()=>{
        // bip bip biiiip sur les 3 dernières secondes
        if(next===2&&!beepFiredRef.current.b2){beepFiredRef.current.b2=true;beepShort();}
        else if(next===1&&!beepFiredRef.current.b1){beepFiredRef.current.b1=true;beepShort();}
        else if(next===0&&!beepFiredRef.current.b0){beepFiredRef.current.b0=true;beepLong();}
        return next;
      });
    },500);
    return()=>clearInterval(timerRef.current);
  },[athlete]);

  // Auto-valide quand countdown atteint 0
  useEffect(()=>{
    if(countdown!==0||!athlete)return;
    const i=athlete.currentExercise||0;
    const ex=athlete.exercises?.[i];
    if(ex?.type==="time"&&!ex.done&&!ex.failed)completeTimeEx();
  },[countdown]);

  const _advance=async(upd,i)=>{
    if(i+1>=athlete.exercises.length){const snap=await db.ref(`sessions/${sessionId}/startTime`).get();upd.finishTime=Date.now()-snap.val();}
    else upd.currentExercise=i+1;
  };

  const addRep=async()=>{
    if(!athlete||athlete.finishTime)return;
    setFlash(true);setTimeout(()=>setFlash(false),100);
    const i=athlete.currentExercise||0;
    const ex=athlete.exercises[i];
    if(ex.type==="chain"){
      const si=ex.currentStep||0;const s=ex.steps[si];
      if(s.type==="time")return;
      const next=(s.completedReps||0)+1;
      const p=`exercises/${i}/steps/${si}`;
      if(next>=s.targetReps){
        const upd={[`${p}/completedReps`]:next,[`${p}/done`]:true};
        if(si+1>=ex.steps.length){upd[`exercises/${i}/done`]=true;await _advance(upd,i);}
        else upd[`exercises/${i}/currentStep`]=si+1;
        await aRef.current.update(upd);
      }else await aRef.current.child(`${p}/completedReps`).set(next);
      return;
    }
    const next=(ex.completedReps||0)+1;
    if(next>=ex.targetReps){
      const upd={[`exercises/${i}/completedReps`]:next,[`exercises/${i}/done`]:true};
      await _advance(upd,i);await aRef.current.update(upd);
    }else await aRef.current.child(`exercises/${i}/completedReps`).set(next);
  };

  const addNoRep=async()=>{
    if(!athlete||athlete.finishTime)return;
    soundNoRep();
    setFlashNR(true);setTimeout(()=>setFlashNR(false),120);
    await aRef.current.update({noReps:(athlete.noReps||0)+1});
  };

  const launchTimer=async()=>{
    if(!athlete||athlete.finishTime)return;
    const i=athlete.currentExercise||0;const ex=athlete.exercises[i];
    if(ex.type==="chain"){const si=ex.currentStep||0;await aRef.current.child(`exercises/${i}/steps/${si}`).update({timerStarted:Date.now(),accumulatedMs:0});}
    else await aRef.current.child(`exercises/${i}`).update({timerStarted:Date.now(),accumulatedMs:0});
  };

  const pauseTimer=async()=>{
    if(!athlete||athlete.finishTime)return;
    const i=athlete.currentExercise||0;const ex=athlete.exercises[i];
    let activeStep,path;
    if(ex.type==="chain"){const si=ex.currentStep||0;activeStep=ex.steps[si];path=`exercises/${i}/steps/${si}`;}
    else{activeStep=ex;path=`exercises/${i}`;}
    if(!activeStep?.timerStarted)return;
    const elapsed=(activeStep.accumulatedMs||0)+(Date.now()-activeStep.timerStarted);
    await aRef.current.update({[`${path}/timerStarted`]:null,[`${path}/accumulatedMs`]:elapsed});
  };

  const resumeTimer=async()=>{
    if(!athlete||athlete.finishTime)return;
    const i=athlete.currentExercise||0;const ex=athlete.exercises[i];
    let path;
    if(ex.type==="chain"){const si=ex.currentStep||0;path=`exercises/${i}/steps/${si}`;}
    else path=`exercises/${i}`;
    await aRef.current.child(`${path}/timerStarted`).set(Date.now());
  };

  const completeTimeEx=async()=>{
    if(!athlete||athlete.finishTime)return;
    const i=athlete.currentExercise||0;const ex=athlete.exercises[i];
    if(ex.type==="chain"){
      const si=ex.currentStep||0;const p=`exercises/${i}/steps/${si}`;
      const upd={[`${p}/done`]:true,[`${p}/timerStarted`]:null};
      if(si+1>=ex.steps.length){upd[`exercises/${i}/done`]=true;await _advance(upd,i);}
      else upd[`exercises/${i}/currentStep`]=si+1;
      await aRef.current.update(upd);return;
    }
    const upd={[`exercises/${i}/done`]:true,[`exercises/${i}/timerStarted`]:null};
    await _advance(upd,i);await aRef.current.update(upd);
  };

  const failTimeEx=async()=>{
    if(!athlete||athlete.finishTime)return;
    const i=athlete.currentExercise||0;const ex=athlete.exercises[i];
    if(ex.type==="chain"){
      const si=ex.currentStep||0;const p=`exercises/${i}/steps/${si}`;
      const upd={[`${p}/failed`]:true,[`${p}/timerStarted`]:null};
      if(si+1>=ex.steps.length){upd[`exercises/${i}/done`]=true;await _advance(upd,i);}
      else upd[`exercises/${i}/currentStep`]=si+1;
      await aRef.current.update(upd);return;
    }
    const upd={[`exercises/${i}/failed`]:true,[`exercises/${i}/timerStarted`]:null};
    await _advance(upd,i);await aRef.current.update(upd);
  };

  // ── Validé / Raté pour exercices avec fallback ──────────────────────────────
  const validateExercise=async()=>{
    if(!athlete||athlete.finishTime)return;
    setFlash(true);setTimeout(()=>setFlash(false),100);
    const i=athlete.currentExercise||0;const ex=athlete.exercises[i];
    const upd={[`exercises/${i}/completedReps`]:ex.targetReps,[`exercises/${i}/done`]:true};
    await _advance(upd,i);await aRef.current.update(upd);
  };

  const rateExercise=()=>{
    soundNoRep();
    setFallbackMode(true);
    setFallbackReps(0);
  };

  const addFallbackRep=()=>{
    if(!athlete||athlete.finishTime)return;
    setFallbackFlash(true);setTimeout(()=>setFallbackFlash(false),80);
    const i=athlete.currentExercise||0;
    const ex=athlete.exercises[i];
    const target=ex.fallback?.targetReps||1;
    const next=fallbackReps+1;
    setFallbackReps(next);
    if(next>=target){
      // Fallback réussi → on marque l'exercice comme fait et on avance
      setTimeout(async()=>{
        setFallbackMode(false);
        setFallbackReps(0);
        const upd={[`exercises/${i}/done`]:true};
        await _advance(upd,i);
        await aRef.current.update(upd);
      },200);
    }
  };

  const startAll=async()=>db.ref(`sessions/${sessionId}`).update({started:true,startTime:Date.now()});

  // ── Sélecteur d'athlète ───────────────────────────────────────────────────
  if(!selected){
    if(!session)return<Loader/>;
    const list=Object.entries(session.athletes||{}).map(([name,d])=>({name,...d}));
    return(
      <div style={{minHeight:"100vh",background:G.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16,padding:28}}>
        <div style={{fontSize:9,letterSpacing:6,color:G.muted}}>SESSION {sessionId}</div>
        <div style={{fontSize:28,fontWeight:900,letterSpacing:2,color:G.text,marginBottom:8}}>QUI JUGEZ-VOUS ?</div>
        <div style={{width:"100%",maxWidth:420,display:"grid",gap:12}}>
          {list.map(a=>(
            <button key={a.name} onClick={()=>setSelected(a.name)}
              style={{background:G.surface,border:`2px solid ${a.color}`,borderRadius:14,padding:"22px 28px",cursor:"pointer",color:a.color,fontFamily:"'Barlow Condensed',sans-serif",fontSize:30,fontWeight:900,letterSpacing:3,textAlign:"center"}}>
              {a.name.toUpperCase()}
            </button>
          ))}
        </div>
        {!started&&(
          <button onClick={startAll} style={{marginTop:8,background:"#30D158",border:"none",borderRadius:10,color:"#000",fontFamily:"'Barlow Condensed',sans-serif",fontSize:16,fontWeight:900,letterSpacing:3,padding:"14px 32px",cursor:"pointer"}}>
            ▶ DÉMARRER LE BATTLE
          </button>
        )}
      </div>
    );
  }

  if(!athlete)return<Loader/>;

  const color=athlete.color;
  const idx=athlete.currentExercise||0;
  const ex=athlete.exercises?.[idx];
  const finished=!!athlete.finishTime;
  const isChain=ex?.type==="chain";
  const sIdx=isChain?(ex.currentStep||0):0;
  const step=isChain?ex?.steps?.[sIdx]:ex;
  const isTimeStep=step?.type==="time";
  // Exercice avec fallback (Muscle-up) : pas chain, pas time, a un .fallback
  const hasFallback=!isChain&&!isTimeStep&&!!ex?.fallback;
  // États du timer ISO
  const isoTimerRunning=isTimeStep&&!!step?.timerStarted&&!step?.done;
  const isoTimerPaused=isTimeStep&&!step?.timerStarted&&!!(step?.accumulatedMs)&&!step?.done;
  const pct=(()=>{
    if(!ex)return 1;
    if(isChain){const done=ex.steps.filter(s=>s.done).length;const cur=isTimeStep?(countdown!==null?Math.max(0,1-countdown/(step.duration||1)):0):Math.min(1,(step?.completedReps||0)/(step?.targetReps||1));return Math.max(0,Math.min(1,(done+cur)/ex.steps.length));}
    if(isTimeStep)return countdown!==null?Math.max(0,1-countdown/(step.duration||1)):step?.done?1:0;
    return Math.min(1,(step?.completedReps||0)/(step?.targetReps||1));
  })();

  // ── Victory screen ─────────────────────────────────────────────────────────
  if(finished)return(
    <div style={{height:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:G.bg,gap:16}}>
      <div style={{fontSize:64,animation:"victory-pop .5s cubic-bezier(.34,1.56,.64,1) both"}}>🏆</div>
      <div style={{fontSize:36,fontWeight:900,letterSpacing:6,background:"linear-gradient(135deg,#FFD60A,#30D158)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",animation:"victory-pop .5s .12s cubic-bezier(.34,1.56,.64,1) both"}}>
        CIRCUIT TERMINÉ !
      </div>
      <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:44,color}}>{fmt(athlete.finishTime)}</div>
      <button onClick={()=>setSelected(null)} style={{marginTop:12,background:G.surface,border:`1px solid ${G.border}`,borderRadius:8,color:G.muted,fontFamily:"'Barlow Condensed',sans-serif",fontSize:13,letterSpacing:2,padding:"10px 20px",cursor:"pointer"}}>
        ← CHANGER D'ATHLÈTE
      </button>
    </div>
  );

  // ── Interface juge ────────────────────────────────────────────────────────
  return(
    <div style={{height:"100vh",display:"flex",flexDirection:"column",background:flash||fallbackFlash?`rgba(${rgb(color)},0.15)`:G.bg,transition:"background .08s",userSelect:"none",WebkitUserSelect:"none"}}>

      {/* Header */}
      <div style={{padding:"10px 16px",background:G.surface,borderBottom:`1px solid ${G.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          <button onClick={()=>setSelected(null)} style={{background:"transparent",border:"none",color:G.muted,fontFamily:"'Barlow Condensed',sans-serif",fontSize:12,letterSpacing:2,cursor:"pointer",padding:0}}>
            ← ATHLÈTE
          </button>
          <button onClick={()=>{window.location.href=window.location.pathname;}} style={{background:"transparent",border:"none",color:G.muted,fontFamily:"'Barlow Condensed',sans-serif",fontSize:12,letterSpacing:2,cursor:"pointer",padding:0,opacity:.5}}>
            ⌂
          </button>
        </div>
        <div style={{fontSize:9,letterSpacing:4,color:G.muted}}>JUGE · {sessionId}</div>
        {!started
          ?<button onClick={startAll} style={{background:"#30D158",border:"none",borderRadius:8,color:"#000",fontFamily:"'Barlow Condensed',sans-serif",fontSize:13,fontWeight:900,letterSpacing:2,padding:"8px 14px",cursor:"pointer"}}>▶ START</button>
          :<div style={{width:42}}/>
        }
      </div>

      {/* Bande circuit */}
      <div ref={stripRef} className="strip-hide" style={{overflowX:"auto",flexShrink:0,background:G.surface,borderBottom:`1px solid ${G.border}`,WebkitOverflowScrolling:"touch",scrollbarWidth:"none"}}>
        <div style={{display:"flex",gap:4,padding:"8px 12px",alignItems:"stretch",minWidth:"max-content"}}>
          {(athlete.exercises||[]).map((e,i)=>{
            const done=e.done;const cur=i===idx;const upcoming=i>idx&&!done;
            const exQty=e.type==="time"?`${e.duration}s`:e.type==="chain"?`⛓${e.steps?.length}`:e.targetReps;
            const shortName=e.name.replace(/\s+\+\s+/g,"+").split(/\s+/).slice(0,2).join(" ");
            return(
              <div key={i} id={`strip-pill-${i}`} style={{
                display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
                gap:1,padding:"5px 8px",borderRadius:7,minWidth:52,
                background:done?`rgba(${rgb(color)},0.18)`:cur?`rgba(${rgb(color)},0.28)`:"transparent",
                border:`1px solid ${done||cur?color:G.border}`,
                opacity:upcoming?0.45:1,transition:"all .2s"
              }}>
                <div style={{fontSize:8,fontWeight:900,letterSpacing:1,color:done||cur?color:G.muted,lineHeight:1}}>
                  {done?"✓":String(i+1).padStart(2,"0")}
                </div>
                <div style={{fontSize:9,fontWeight:cur?700:400,color:done?color:cur?G.text:G.muted,whiteSpace:"nowrap",maxWidth:52,overflow:"hidden",textOverflow:"ellipsis",lineHeight:1.2,textAlign:"center"}}>
                  {shortName.toUpperCase()}
                </div>
                <div style={{fontSize:8,fontFamily:"monospace",color:done?color:cur?"#FFD60A":G.muted,lineHeight:1}}>
                  {exQty}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Infos athlète */}
      <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"12px 20px",borderBottom:`3px solid ${fallbackMode?"#FF9500":color}`,background:fallbackMode?"rgba(255,149,0,0.06)":`rgba(${rgb(color)},0.04)`}}>
        <div style={{fontSize:10,letterSpacing:4,color:G.muted,marginBottom:6,textAlign:"center"}}>
          {fallbackMode
            ? <span style={{color:"#FF9500"}}>⚠ FALLBACK — MUSCLE UP RATÉ</span>
            : <>EXERCICE {idx+1} / {athlete.exercises?.length}{isChain&&<span style={{color:"#FF9500"}}> · ⛓ STEP {sIdx+1}/{ex.steps.length}</span>}</>
          }
        </div>
        <div style={{fontSize:42,fontWeight:900,color:fallbackMode?"#FF9500":color,letterSpacing:1,lineHeight:1,marginBottom:4,textAlign:"center"}}>{selected.toUpperCase()}</div>
        {!fallbackMode&&isChain&&<div style={{fontSize:11,color:G.muted,letterSpacing:1,marginBottom:4,textAlign:"center",maxWidth:"90%",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ex.name.toUpperCase()}</div>}
        <div style={{fontSize:isChain?24:22,color:G.text,letterSpacing:2,marginBottom:12,textAlign:"center",fontWeight:700}}>
          {fallbackMode
            ? <span style={{color:"#FF9500"}}>{(ex.fallback?.targetReps||"")+" "+(ex.fallback?.name||"").toUpperCase()}</span>
            : step?.name?.toUpperCase()
          }
        </div>
        {fallbackMode?(
          <div style={{fontFamily:"'Share Tech Mono',monospace",lineHeight:1,textAlign:"center"}}>
            <span style={{fontSize:82,fontWeight:700,color:"#FF9500"}}>{fallbackReps}</span>
            <span style={{fontSize:32,color:G.muted}}> / {ex.fallback?.targetReps}</span>
          </div>
        ):isTimeStep?(
          <div style={{fontFamily:"'Share Tech Mono',monospace",lineHeight:1,textAlign:"center"}}>
            <span style={{fontSize:82,fontWeight:700,color:countdown===0?"#30D158":isoTimerPaused?"#FFD60A":color}}>
              {countdown!==null?(step.duration-countdown):0}
            </span>
            <span style={{fontSize:32,color:G.muted}}> s</span>
            {countdown!==null&&<div style={{fontSize:12,letterSpacing:3,color:isoTimerPaused?"#FFD60A":G.muted,marginTop:4}}>
              {countdown===0?"TEMPS !":isoTimerPaused?"⏸ EN PAUSE":`/ ${step.duration}s`}
            </div>}
          </div>
        ):(
          <div style={{fontFamily:"'Share Tech Mono',monospace",lineHeight:1,textAlign:"center"}}>
            <span style={{fontSize:82,fontWeight:700,color}}>{step?.completedReps||0}</span>
            <span style={{fontSize:32,color:G.muted}}> / {step?.targetReps}</span>
          </div>
        )}
        {hasFallback&&!fallbackMode&&(
          <div style={{marginTop:8,fontSize:11,color:"#FF9500",background:"rgba(255,149,0,.08)",borderLeft:"2px solid #FF9500",padding:"4px 12px",borderRadius:4}}>
            Fallback si raté : {ex.fallback.targetReps} {ex.fallback.name}
          </div>
        )}
        {fallbackMode&&(
          <div style={{marginTop:6,fontSize:11,color:"#FF3B30",letterSpacing:2}}>RESTE BLOQUÉ JUSQU'À RÉUSSIR</div>
        )}
        <div style={{width:"70%",maxWidth:260,height:5,background:G.border,borderRadius:100,marginTop:12,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${(fallbackMode?fallbackReps/(ex.fallback?.targetReps||1):pct)*100}%`,background:fallbackMode?"#FF9500":isTimeStep&&countdown===0?"#30D158":color,borderRadius:100,transition:"width .15s",boxShadow:fallbackMode?`0 0 10px rgba(255,149,0,0.6)`:`0 0 10px rgba(${rgb(color)},0.6)`}}/>
        </div>
        {/* Prochain mouvement */}
        {!fallbackMode&&idx+1<(athlete.exercises||[]).length&&(()=>{
          const next=athlete.exercises[idx+1];
          const nextQty=next.type==="time"?`⏱ ${next.duration}s`:next.type==="chain"?`⛓ ${next.steps?.length} STEPS`:`${next.targetReps} REPS`;
          return(
            <div style={{marginTop:10,padding:"6px 14px",background:`rgba(${rgb(color)},0.07)`,border:`1px solid rgba(${rgb(color)},0.2)`,borderRadius:8,textAlign:"center",display:"flex",alignItems:"center",gap:10}}>
              <div style={{fontSize:9,letterSpacing:3,color:G.muted,whiteSpace:"nowrap"}}>PROCHAIN</div>
              <div style={{fontSize:13,fontWeight:700,color:G.text,letterSpacing:1}}>
                <span style={{color:"#FFD60A",fontFamily:"monospace",marginRight:4}}>{nextQty}</span>
                {next.name.toUpperCase()}
              </div>
            </div>
          );
        })()}
      </div>

      {/* Zone basse — action buttons */}
      {fallbackMode?(
        /* Mode fallback : grand bouton + rep + NO REP */
        <div style={{height:"50vh",display:"flex",flexShrink:0}}>
          <button className="plus-btn" onPointerDown={e=>{e.preventDefault();addFallbackRep();}}
            style={{flex:1,background:fallbackFlash?"rgba(255,149,0,0.3)":"rgba(255,149,0,0.12)",border:"none",borderTop:"3px solid #FF9500",color:"#FF9500",fontFamily:"'Barlow Condensed',sans-serif",fontSize:120,fontWeight:900,lineHeight:1,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",WebkitUserSelect:"none",userSelect:"none",transition:"background .08s"}}>
            +
          </button>
          <button onPointerDown={e=>{e.preventDefault();addNoRep();}}
            style={{flex:1,background:flashNR?"rgba(255,59,48,0.28)":"rgba(255,59,48,0.08)",border:"none",borderTop:"3px solid #FF3B30",borderLeft:`1px solid ${G.border}`,color:"#FF3B30",fontFamily:"'Barlow Condensed',sans-serif",fontSize:72,fontWeight:900,lineHeight:1,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",WebkitUserSelect:"none",userSelect:"none",transition:"background .08s",gap:8}}>
            🚩
            <span style={{fontSize:16,letterSpacing:3,fontWeight:700}}>NO-REP</span>
          </button>
        </div>
      ):isTimeStep?(
        // ── Pas encore lancé ──────────────────────────────────────────────────
        countdown===null&&!isoTimerPaused?(
          <button onPointerDown={e=>{e.preventDefault();launchTimer();}}
            style={{height:"50vh",flexShrink:0,background:`rgba(${rgb(color)},0.1)`,border:"none",borderTop:`3px solid ${color}`,color,fontFamily:"'Barlow Condensed',sans-serif",fontSize:60,fontWeight:900,letterSpacing:4,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",WebkitUserSelect:"none",userSelect:"none",gap:8}}>
            ▶
            <span style={{fontSize:22,letterSpacing:6}}>LANCER</span>
          </button>
        // ── En cours ──────────────────────────────────────────────────────────
        ):isoTimerRunning?(
          <div style={{height:"50vh",display:"flex",flexDirection:"column",flexShrink:0}}>
            <button onPointerDown={e=>{e.preventDefault();pauseTimer();}}
              style={{flex:1,background:`rgba(${rgb(color)},0.1)`,border:"none",borderTop:`3px solid ${color}`,color,fontFamily:"'Barlow Condensed',sans-serif",fontSize:56,fontWeight:900,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",WebkitUserSelect:"none",userSelect:"none",gap:6}}>
              ⏸
              <span style={{fontSize:18,letterSpacing:6}}>PAUSE</span>
            </button>
            <div style={{display:"flex",height:"38%",flexShrink:0}}>
              <button onPointerDown={e=>{e.preventDefault();completeTimeEx();}}
                style={{flex:1,background:"rgba(48,209,88,0.12)",border:"none",borderTop:"3px solid #30D158",color:"#30D158",fontFamily:"'Barlow Condensed',sans-serif",fontSize:32,fontWeight:900,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",WebkitUserSelect:"none",userSelect:"none",gap:4}}>
                ✅ <span style={{fontSize:14,letterSpacing:3}}>TENU</span>
              </button>
              <button onPointerDown={e=>{e.preventDefault();failTimeEx();}}
                style={{flex:1,background:"rgba(255,59,48,0.1)",border:"none",borderTop:"3px solid #FF3B30",borderLeft:`1px solid ${G.border}`,color:"#FF3B30",fontFamily:"'Barlow Condensed',sans-serif",fontSize:32,fontWeight:900,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",WebkitUserSelect:"none",userSelect:"none",gap:4}}>
                ⛔ <span style={{fontSize:14,letterSpacing:3}}>RATÉ</span>
              </button>
            </div>
          </div>
        // ── En pause ──────────────────────────────────────────────────────────
        ):(
          <div style={{height:"50vh",display:"flex",flexDirection:"column",flexShrink:0}}>
            <button onPointerDown={e=>{e.preventDefault();resumeTimer();}}
              style={{flex:1,background:"rgba(255,214,10,0.12)",border:"none",borderTop:"3px solid #FFD60A",color:"#FFD60A",fontFamily:"'Barlow Condensed',sans-serif",fontSize:56,fontWeight:900,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",WebkitUserSelect:"none",userSelect:"none",gap:6}}>
              ▶
              <span style={{fontSize:18,letterSpacing:4}}>REPRENDRE</span>
            </button>
            <div style={{display:"flex",height:"38%",flexShrink:0}}>
              <button onPointerDown={e=>{e.preventDefault();completeTimeEx();}}
                style={{flex:1,background:"rgba(48,209,88,0.12)",border:"none",borderTop:"3px solid #30D158",color:"#30D158",fontFamily:"'Barlow Condensed',sans-serif",fontSize:32,fontWeight:900,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",WebkitUserSelect:"none",userSelect:"none",gap:4}}>
                ✅ <span style={{fontSize:14,letterSpacing:3}}>TENU</span>
              </button>
              <button onPointerDown={e=>{e.preventDefault();failTimeEx();}}
                style={{flex:1,background:"rgba(255,59,48,0.1)",border:"none",borderTop:"3px solid #FF3B30",borderLeft:`1px solid ${G.border}`,color:"#FF3B30",fontFamily:"'Barlow Condensed',sans-serif",fontSize:32,fontWeight:900,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",WebkitUserSelect:"none",userSelect:"none",gap:4}}>
                ⛔ <span style={{fontSize:14,letterSpacing:3}}>RATÉ</span>
              </button>
            </div>
          </div>
        )
      ):hasFallback?(
        /* Exercice avec fallback (Muscle-up) : VALIDÉ / RATÉ + NO REP */
        <div style={{height:"50vh",flexShrink:0,display:"flex",flexDirection:"column"}}>
          <div style={{flex:1,display:"flex"}}>
            <button onPointerDown={e=>{e.preventDefault();rateExercise();}}
              style={{flex:1,background:"rgba(255,59,48,0.12)",border:"none",borderTop:"3px solid #FF3B30",color:"#FF3B30",fontFamily:"'Barlow Condensed',sans-serif",fontSize:44,fontWeight:900,letterSpacing:2,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",WebkitUserSelect:"none",userSelect:"none",gap:8}}>
              ✗
              <span style={{fontSize:18,letterSpacing:4}}>RATÉ</span>
            </button>
            <button onPointerDown={e=>{e.preventDefault();validateExercise();}}
              style={{flex:1,background:`rgba(${rgb(color)},0.12)`,border:"none",borderTop:`3px solid ${color}`,borderLeft:`1px solid ${G.border}`,color,fontFamily:"'Barlow Condensed',sans-serif",fontSize:44,fontWeight:900,letterSpacing:2,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",WebkitUserSelect:"none",userSelect:"none",gap:8}}>
              ✓
              <span style={{fontSize:18,letterSpacing:4}}>VALIDÉ</span>
            </button>
          </div>
          <button onPointerDown={e=>{e.preventDefault();addNoRep();}}
            style={{height:56,background:flashNR?"rgba(255,59,48,0.22)":"rgba(255,59,48,0.06)",border:"none",borderTop:`1px solid ${G.border}`,color:"#FF3B30",fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,fontWeight:700,letterSpacing:4,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8,WebkitUserSelect:"none",userSelect:"none",transition:"background .08s"}}>
            🚩 NO-REP
          </button>
        </div>
      ):(
        /* Exercice normal : + rep + NO REP */
        <div style={{height:"50vh",display:"flex",flexShrink:0}}>
          <button className="plus-btn" onPointerDown={e=>{e.preventDefault();addRep();}}
            style={{flex:1,background:flash?`rgba(${rgb(color)},0.3)`:`rgba(${rgb(color)},0.1)`,border:"none",borderTop:`3px solid ${color}`,borderRight:`1px solid ${G.border}`,color,fontFamily:"'Barlow Condensed',sans-serif",fontSize:120,fontWeight:900,lineHeight:1,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",WebkitUserSelect:"none",userSelect:"none",transition:"background .08s"}}>
            +
          </button>
          <button onPointerDown={e=>{e.preventDefault();addNoRep();}}
            style={{flex:1,background:flashNR?"rgba(255,59,48,0.28)":"rgba(255,59,48,0.08)",border:"none",borderTop:"3px solid #FF3B30",color:"#FF3B30",fontFamily:"'Barlow Condensed',sans-serif",fontSize:72,fontWeight:900,lineHeight:1,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",WebkitUserSelect:"none",userSelect:"none",transition:"background .08s",gap:8}}>
            🚩
            <span style={{fontSize:16,letterSpacing:3,fontWeight:700}}>NO-REP</span>
          </button>
        </div>
      )}
    </div>
  );
}

// ── MAIN SCREEN ────────────────────────────────────────────────────────────
function MainScreen({sessionId}){
  const[session,setSession]=useState(null);
  const[elapsed,setElapsed]=useState(0);
  const[tick,setTick]=useState(0);
  const rafRef=useRef(null);
  const tickRef=useRef(null);

  useEffect(()=>{
    const ref=db.ref(`sessions/${sessionId}`);
    ref.on("value",s=>{if(s.exists())setSession(s.val());});
    return()=>ref.off();
  },[]);

  useEffect(()=>{
    cancelAnimationFrame(rafRef.current);
    if(!session?.started||!session?.startTime)return;
    const t=()=>{setElapsed(Date.now()-session.startTime);rafRef.current=requestAnimationFrame(t);};
    rafRef.current=requestAnimationFrame(t);
    return()=>cancelAnimationFrame(rafRef.current);
  },[session?.started,session?.startTime]);

  // Tick secondaire pour les countdowns iso
  useEffect(()=>{
    clearInterval(tickRef.current);
    const aths=Object.values(session?.athletes||{});
    const hasTimer=aths.some(a=>{const i=a.currentExercise||0,e=a.exercises?.[i];return e?.type==="time"&&e?.timerStarted&&!e?.done&&!e?.failed;});
    if(!hasTimer)return;
    tickRef.current=setInterval(()=>setTick(t=>t+1),1000);
    return()=>clearInterval(tickRef.current);
  },[session]);

  if(!session)return<Loader/>;
  const athletes=Object.entries(session.athletes||{}).map(([name,d])=>({name,...d}));
  const allDone=athletes.length>0&&athletes.every(a=>a.finishTime);

  return(
    <div style={{height:"100vh",background:G.bg,display:"flex",flexDirection:"column"}}>
      <div style={{padding:"8px 24px",borderBottom:`1px solid ${G.border}`,display:"flex",alignItems:"center",justifyContent:"space-between",background:G.surface,flexShrink:0}}>
        <div style={{display:"flex",flexDirection:"column",gap:2}}>
          <div style={{fontSize:9,letterSpacing:4,color:G.muted}}>{(session.phase||"BATTLE").toUpperCase()} · {sessionId}</div>
          <button onClick={()=>{window.location.href=window.location.pathname;}} style={{background:"transparent",border:"none",color:G.muted,fontFamily:"'Barlow Condensed',sans-serif",fontSize:10,letterSpacing:2,cursor:"pointer",padding:0,textAlign:"left",opacity:.6}}>
            ⌂ SETUP
          </button>
        </div>
        <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:44,letterSpacing:2,color:allDone?"#30D158":session.started?G.text:G.muted,lineHeight:1}}>{fmt(elapsed)}</div>
        <div style={{fontSize:11,letterSpacing:3,color:G.muted}}>{athletes.filter(a=>a.finishTime).length}/{athletes.length} FINIS</div>
      </div>
      <div style={{flex:1,display:"grid",gridTemplateColumns:`repeat(${athletes.length},1fr)`,gap:1,background:G.border,overflow:"hidden"}}>
        {athletes.map(a=>{
          const color=a.color,idx=a.currentExercise||0,ex=a.exercises?.[idx],finished=!!a.finishTime;
          const isChainEx=ex?.type==="chain";
          const chainSIdx=isChainEx?(ex.currentStep||0):0;
          const chainStep=isChainEx?ex?.steps?.[chainSIdx]:null;
          const activeForTime=isChainEx?chainStep:ex;
          const isTimeEx=activeForTime?.type==="time";
          const timeRem=isTimeEx&&activeForTime?.timerStarted&&!activeForTime?.done?Math.max(0,(activeForTime.duration||0)-Math.floor((Date.now()-activeForTime.timerStarted+tick*0)/1000)):null;
          const pct=(()=>{
            if(!ex)return 1;
            if(isChainEx){const done=ex.steps.filter(s=>s.done).length;const cur=isTimeEx?(timeRem!==null?Math.max(0,1-timeRem/(activeForTime.duration||1)):activeForTime?.done?1:0):Math.min(1,(chainStep?.completedReps||0)/(chainStep?.targetReps||1));return Math.max(0,Math.min(1,(done+cur)/ex.steps.length));}
            if(isTimeEx)return timeRem!==null?Math.max(0,1-timeRem/(ex.duration||1)):ex?.done?1:0;
            return ex?Math.min(1,(ex.completedReps||0)/ex.targetReps):1;
          })();
          return(
            <div key={a.name} style={{background:G.bg,display:"flex",flexDirection:"column",overflow:"hidden"}}>
              <div style={{background:color,padding:"12px 16px",flexShrink:0}}>
                <div style={{fontSize:20,fontWeight:900,color:"#000",letterSpacing:1,lineHeight:1}}>{a.name.toUpperCase()}</div>
                <div style={{fontSize:10,color:"rgba(0,0,0,0.55)",fontWeight:600,letterSpacing:2,marginTop:2}}>{finished?`✓ ${fmt(a.finishTime)}`:`EX ${idx+1}/${a.exercises?.length}`}</div>
              </div>
              <div style={{height:4,background:G.border,flexShrink:0,position:"relative"}}>
                <div style={{position:"absolute",left:0,top:0,height:"100%",width:`${pct*100}%`,background:color,transition:"width .2s",boxShadow:`0 0 8px ${color}`}}/>
              </div>
              <div style={{padding:"14px 16px",borderBottom:`1px solid ${G.border}`,flexShrink:0,background:`rgba(${rgb(color)},0.05)`}}>
                <div style={{fontSize:11,letterSpacing:3,color,marginBottom:2}}>{ex?.name?.toUpperCase()}</div>
                <div style={{display:"flex",alignItems:"baseline",gap:10,flexWrap:"wrap"}}>
                  <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:isChainEx?38:58,fontWeight:700,color:isTimeEx&&activeForTime?.done?"#30D158":isTimeEx&&activeForTime?.failed?"#FF3B30":color,lineHeight:1}}>
                    {isChainEx?(
                      ex?.done?<span style={{fontSize:40}}>✓</span>:<span>{ex.steps.filter(s=>s.done).length}/{ex.steps.length}<span style={{fontSize:16,color:G.muted}}> ⛓</span>{isTimeEx&&timeRem!==null?<span style={{fontSize:22}}> {timeRem}s</span>:isTimeEx?<span style={{fontSize:14}}>⏱</span>:<span style={{fontSize:18}}> {chainStep?.completedReps||0}/{chainStep?.targetReps}</span>}</span>
                    ):isTimeEx?(
                      ex?.done?"✓":ex?.failed?"✕":timeRem!==null?<span>{timeRem}<span style={{fontSize:22,color:G.muted}}> s</span></span>:<span style={{fontSize:32}}>⏱ {ex?.duration}s</span>
                    ):(
                      <span>{ex?.completedReps||0}<span style={{fontSize:22,color:G.muted}}> / {ex?.targetReps}</span></span>
                    )}
                  </div>
                  <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:16,fontWeight:700,color:"#FF3B30",letterSpacing:1,whiteSpace:"nowrap"}}>
                    🚩×{a.noReps||0}
                  </div>
                </div>
                {isChainEx&&!ex?.done&&<div style={{fontSize:10,color:G.muted,letterSpacing:2,marginTop:4}}>{chainStep?.name?.toUpperCase()}</div>}
              </div>
              <div style={{flex:1,overflow:"auto"}}>
                {(a.exercises||[]).map((e,i)=>(
                  <div key={i} style={{padding:"9px 16px",display:"flex",alignItems:"center",gap:8,borderBottom:`1px solid ${G.border}`,background:e.done?`rgba(${rgb(color)},0.1)`:i===idx?`rgba(${rgb(color)},0.04)`:"transparent",opacity:i>idx&&!e.done?.4:1}}>
                    <div style={{width:20,height:20,borderRadius:"50%",border:`2px solid ${e.done?color:i===idx?color:G.border}`,background:e.done?color:"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:e.done?"#000":i===idx?color:G.muted,flexShrink:0}}>
                      {e.done?"✓":i+1}
                    </div>
                    <div style={{flex:1,fontSize:12,fontWeight:i===idx?700:400,color:e.done?color:i===idx?G.text:G.muted}}>{e.name}</div>
                    <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:11,color:e.done?color:e.failed?"#FF3B30":i===idx?"#FFD60A":G.muted}}>
                      {e.type==="chain"?`⛓ ${e.steps.filter(s=>s.done).length}/${e.steps.length}`:e.type==="time"?(e.done?"✓":e.failed?"✕":`${e.duration}s`):(i<idx||e.done?e.targetReps:i===idx?e.completedReps||0:0)+(e.type==="time"?"":"/"+e.targetReps)}
                    </div>
                  </div>
                ))}
              </div>
              {finished&&(
                <div style={{padding:12,background:`rgba(${rgb(color)},0.15)`,borderTop:`2px solid ${color}`,textAlign:"center",flexShrink:0}}>
                  <div style={{fontSize:9,color,letterSpacing:3}}>TEMPS FINAL</div>
                  <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:26,color}}>{fmt(a.finishTime)}</div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function App(){
  if(urlMode==="judge"&&urlSession)return<JudgeScreen sessionId={urlSession} athleteName={urlAthlete?decodeURIComponent(urlAthlete):null}/>;
  if(urlMode==="screen"&&urlSession)return<MainScreen sessionId={urlSession}/>;
  return<SetupScreen/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
